<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Adina and Andrew's wedding website.">
    <title>Adina & Andrew - RSVP</title>
    <link rel="icon" type="image/png" sizes="512x512" href="/images/favicon.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/images/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preload" as="image" href="images/textures/combined-light.png">
    <link rel="preload" as="image" href="images/textures/combined-dark.png">
</head>

<body class="page-rsvp">
    <!-- Password Protection Overlay -->
    <div id="password-overlay">
        <div class="password-container">
            <h2>RSVP</h2>
            <p>Please enter the password:</p>
            <form id="password-form">
                <input type="password" id="password-input" class="password-input" placeholder="Enter password"
                    autocomplete="off">
                <button type="submit" class="password-submit">Enter</button>
                <p class="password-error" id="password-error">Incorrect password. Please try again.</p>
            </form>
        </div>
    </div>

    <!-- Nav lives outside #protected-content so position: fixed isn't broken by parent stacking/blend contexts -->
    <div id="nav-placeholder"></div>

    <!-- Protected Content -->
    <div id="protected-content">

        <main class="registry-page">
            <section class="registry-section">
                <div class="content-wrapper">
                    <h1 class="registry-title">Coming Soon!</h1>
                </div>
            </section>
        </main>

        <div id="footer-placeholder"></div>

    </div>

    <!-- Rive intro canvas — sits outside #protected-content so its stacking context
         isn't broken by the parent. Starts hidden; rive-intro.js reveals it only when
         the animation actually plays (after password unlock), then fades it out on complete. -->
    <div id="rive-container" class="hidden" aria-hidden="true">
        <canvas id="rive-canvas"></canvas>
    </div>
    <!-- Skip button — shown during the animation, hidden otherwise -->
    <button id="skip-intro" class="hidden" aria-label="Skip intro animation">Skip</button>

    <script>
        // Apply dark mode immediately to prevent flash
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.documentElement.classList.add('dark-mode');
            document.body.classList.add('dark-mode');
        }

        // ===========================
        // Password Protection
        // ===========================
        if (location.hash.includes('figmacapture=')) {
            sessionStorage.setItem('siteUnlocked', 'true');
        }
        const correctPassword = 'october17';
        const passwordOverlay = document.getElementById('password-overlay');
        const protectedContent = document.getElementById('protected-content');
        const passwordForm = document.getElementById('password-form');
        const passwordInput = document.getElementById('password-input');
        const passwordError = document.getElementById('password-error');

        if (sessionStorage.getItem('siteUnlocked') === 'true') {
            unlockContent();
        }

        passwordForm.addEventListener('submit', function (e) {
            e.preventDefault();
            if (passwordInput.value === correctPassword) {
                sessionStorage.setItem('siteUnlocked', 'true');
                unlockContent();
            } else {
                passwordError.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        function unlockContent() {
            passwordOverlay.classList.add('hidden');
            protectedContent.classList.add('unlocked');
            document.body.classList.remove('locked');
        }

        if (sessionStorage.getItem('siteUnlocked') !== 'true') {
            document.body.classList.add('locked');
        }

        passwordInput.addEventListener('input', function () {
            passwordError.classList.remove('show');
        });
    </script>
    <script src="includes/site-init.js"></script>
    <script src="js/rive-intro.js"></script>
</body>

</html>
