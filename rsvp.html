<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Adina and Andrew's wedding website.">
    <title>Adina & Andrew - RSVP</title>
    <link rel="icon" type="image/png" sizes="512x512" href="/images/favicon.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/images/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preload" as="image" href="images/textures/combined-light.png">
    <link rel="preload" as="image" href="images/textures/combined-dark.png">
    <!-- The end-state card must be decoded before the hard cut lands on it. -->
    <link rel="preload" as="image" href="images/invitation/invitation-light-new.png">
</head>

<body class="page-rsvp">
    <!-- Password Protection Overlay -->
    <div id="password-overlay">
        <div class="password-container">
            <h2>RSVP</h2>
            <p>Please enter the password:</p>
            <form id="password-form">
                <input type="password" id="password-input" class="password-input" placeholder="Enter password"
                    autocomplete="off">
                <button type="submit" class="password-submit">Enter</button>
                <p class="password-error" id="password-error">Incorrect password. Please try again.</p>
            </form>
        </div>
    </div>

    <!-- Nav lives outside #protected-content so position: fixed isn't broken by parent stacking/blend contexts -->
    <div id="nav-placeholder"></div>

    <!-- Protected Content -->
    <div id="protected-content">

        <!-- Invitation end-state: the static page the Metro intro hard-cuts to. It matches
             the animation's final frame (centered invitation card on a 16:9 field, green
             matte on the letterbox). Hidden until rive-intro.js reveals it at the cut so it
             doesn't flash before the animation plays. This is the "invitation state" the
             sequenced RSVP form will grow out of next. -->
        <div id="invitation-endstate" class="invitation-endstate pre-reveal">
            <div class="invitation-field">
                <!-- Same PNG that is baked into the .riv (pixel-identical) — identical
                     rasterization on both sides of the cut is what makes it invisible.
                     Dark mode swaps to the inverted green card via the standard
                     data-light/data-dark mechanism. -->
                <img class="invitation-card" src="images/invitation/invitation-light-new.png"
                    data-light="images/invitation/invitation-light-new.png"
                    data-dark="images/invitation/invitation-dark-new.png"
                    alt="Adina Beth and Andrew Spencer — wedding invitation" />
            </div>
        </div>

        <div id="footer-placeholder"></div>

    </div>

    <!-- Rive intro canvas — sits outside #protected-content so its stacking context
         isn't broken by the parent. Starts hidden; rive-intro.js reveals it only when
         the animation actually plays (after password unlock), then fades it out on complete. -->
    <div id="rive-container" class="hidden" aria-hidden="true">
        <canvas id="rive-canvas"></canvas>
    </div>
    <!-- Skip button — shown during the animation, hidden otherwise -->
    <button id="skip-intro" class="hidden" aria-label="Skip intro animation">Skip</button>

    <!-- Replay icon — fades in with the settle (body.intro-complete). Clears the
         once-per-session gate and reloads, re-entering the single playback pipeline.
         Image is a placeholder (DC flag) using the standard light/dark swap. -->
    <button id="replay-intro" class="replay-intro" aria-label="Replay intro animation">
        <img src="images/illustrations/flag-light.png" data-light="images/illustrations/flag-light.png"
            data-dark="images/illustrations/flag-dark.png" alt="">
    </button>

    <script>
        // Apply dark mode immediately to prevent flash
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.documentElement.classList.add('dark-mode');
            document.body.classList.add('dark-mode');
        }

        // ===========================
        // Password Protection
        // ===========================
        if (location.hash.includes('figmacapture=')) {
            sessionStorage.setItem('siteUnlocked', 'true');
        }
        const correctPassword = 'october17';
        const passwordOverlay = document.getElementById('password-overlay');
        const protectedContent = document.getElementById('protected-content');
        const passwordForm = document.getElementById('password-form');
        const passwordInput = document.getElementById('password-input');
        const passwordError = document.getElementById('password-error');

        if (sessionStorage.getItem('siteUnlocked') === 'true') {
            unlockContent();
        }

        passwordForm.addEventListener('submit', function (e) {
            e.preventDefault();
            if (passwordInput.value === correctPassword) {
                sessionStorage.setItem('siteUnlocked', 'true');
                unlockContent();
            } else {
                passwordError.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        function unlockContent() {
            passwordOverlay.classList.add('hidden');
            protectedContent.classList.add('unlocked');
            document.body.classList.remove('locked');
        }

        if (sessionStorage.getItem('siteUnlocked') !== 'true') {
            document.body.classList.add('locked');
        }

        passwordInput.addEventListener('input', function () {
            passwordError.classList.remove('show');
        });
    </script>
    <script src="includes/site-init.js"></script>
    <script src="js/rive-intro.js"></script>
</body>

</html>
