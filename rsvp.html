<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Adina and Andrew's wedding website.">
    <title>Adina & Andrew - RSVP</title>
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/favicon/favicon.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/assets/favicon/favicon.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/rsvp-styles.css">
    <link rel="preload" as="image" href="assets/textures/combined-light.png">
    <link rel="preload" as="image" href="assets/textures/combined-dark.png">
    <!-- The end-state card's ink layer must be decoded before the hard cut lands on it. -->
    <link rel="preload" as="image" href="assets/invitation/invitation-ink-light.png">
</head>

<body class="page-rsvp">
    <!-- Password Protection Overlay -->
    <div id="password-overlay">
        <div class="password-container">
            <h2>Coming Soon!</h2>
            <p>Please enter the password:</p>
            <form id="password-form">
                <input type="password" id="password-input" class="password-input" placeholder="Enter password"
                    autocomplete="off">
                <button type="submit" class="password-submit">Enter</button>
                <p class="password-error" id="password-error">Incorrect password. Please try again.</p>
            </form>
        </div>
    </div>

    <!-- Fixed grain backdrop — "the paper field stays fixed" (like the nav)
         while the settled card/stack scroll normally over it. Not
         background-attachment: fixed (disabled on iOS Safari) — a real
         position: fixed element instead, painted behind everything else.
         Lives outside #protected-content for the same reason the nav does.
         Hidden until the settle (see styles.css) so it can't cause the
         cream-flash the matte-green pre-settle phase is built to avoid. -->
    <div class="rsvp-fixed-backdrop" aria-hidden="true"></div>

    <!-- Nav lives outside #protected-content so position: fixed isn't broken by parent stacking/blend contexts -->
    <div id="nav-placeholder"></div>

    <!-- Protected Content -->
    <div id="protected-content">

        <!-- Invitation end-state: the static page the Metro intro hard-cuts to. It matches
             the animation's final frame (centered invitation card on a 16:9 field, green
             matte on the letterbox). Hidden until rive-intro.js reveals it at the cut so it
             doesn't flash before the animation plays. This is the "invitation state" the
             sequenced RSVP form will grow out of next. -->
        <div id="invitation-endstate" class="invitation-endstate pre-reveal">
            <div class="invitation-field">
                <!-- Layered paper-card (see .paper-card in styles.css): CSS grain +
                     baked ink PNG + sheet shadow, flat at the hard cut and gaining
                     grain/shadow/emboss at the settle. Ink is the same art baked into
                     the .riv (pixel-identical), just re-exported as a transparent PNG.
                     Dark mode swaps to the inverted green ink via the standard
                     data-light/data-dark mechanism. -->
                <div class="paper-card invitation-card">
                    <img class="paper-card__ink" src="assets/invitation/invitation-ink-light.png"
                        data-light="assets/invitation/invitation-ink-light.png"
                        data-dark="assets/invitation/invitation-ink-dark.png"
                        alt="Adina Beth and Andrew Spencer — wedding invitation" />
                    <!-- Desktop-only (>900px) per-card nav control, item 2 (July 2026):
                         reuses .rsvp-card-nav-next's position/hover/dark styling (see
                         css/rsvp-styles.css) plus the breathing-glow class. Wired in
                         js/rsvp-flow.js's revealPeek(). Mobile keeps #rsvp-arrow below. -->
                    <button id="invitation-nav-next" class="rsvp-card-nav-next rsvp-arrow-breathe" aria-label="Begin RSVP">
                        <span class="rsvp-card-nav-label">RSVP</span>
                        <svg class="rsvp-card-nav-icon" viewBox="0 0 34 16" width="34" height="16" aria-hidden="true"
                            fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M1 8 H 31 M 24.5 1.5 L 31 8 L 24.5 14.5" />
                        </svg>
                    </button>
                </div>
                <!-- RSVP arrow — the entry into the card flow, and (July 2026) the
                     PERSISTENT forward control for the whole stack, not just the
                     first swap. Positioned off the card's artboard fractions (not
                     viewport pixels), so it never moves — the earlier per-card
                     Next button (a DOM child of each sliding card) got crowded by
                     the growing stack depth and visibly slid with its card, which
                     read as a bug. js/rsvp-flow.js relabels it ("RSVP" -> "Next" /
                     "Review") and swaps its validation per the current top card;
                     see updateStackNav. Fades in with the settle; pointer-events:
                     auto re-enables it inside the pointer-events: none end-state.
                     The .rsvp-arrow-breathe class carries the optional breathing
                     glow — delete the class to kill it. -->
                <button id="rsvp-arrow" class="rsvp-arrow rsvp-arrow-breathe" aria-label="Begin RSVP">
                    <span class="rsvp-arrow-label">RSVP</span>
                    <svg class="rsvp-arrow-icon" viewBox="0 0 34 16" width="34" height="16" aria-hidden="true"
                        fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M1 8 H 31 M 24.5 1.5 L 31 8 L 24.5 14.5" />
                    </svg>
                </button>
                <!-- Back — mirrors the arrow on the card's other side, same
                     "persistent, never slides with the card" reasoning. Hidden
                     until the flow starts (nothing to go back to before then). -->
                <button id="rsvp-stack-back" class="rsvp-stack-back" aria-label="Back">
                    <svg class="rsvp-stack-back-icon" viewBox="0 0 34 16" width="34" height="16" aria-hidden="true"
                        fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M33 8 H 3 M 9.5 1.5 L 3 8 L 9.5 14.5" />
                    </svg>
                    <span class="rsvp-stack-back-label">Back</span>
                </button>
                <!-- File-to-back reply card stack — the lookup card, one card per
                     invited event, review, and thank-you. Empty until the peek
                     (js/rsvp-flow.js builds and positions cards here at runtime);
                     shares the invitation card's own on-screen rect (.rsvp-stack
                     in styles.css). -->
                <div id="rsvp-stack" class="rsvp-stack"></div>
            </div>
        </div>

        <!-- Scroll room below the settled invitation (see .invitation-scroll-spacer
             in styles.css) — lets the card scroll against the grain background
             instead of staying pinned. Empty by design; body's own texture shows
             through. -->
        <div class="invitation-scroll-spacer" aria-hidden="true"></div>

        <!-- Scroll room for the reply-card stack, mobile only (rsvp-styles.css) —
             .invitation-scroll-spacer above collapses once the flow starts (it's
             the pre-flow settled-page spacer), so this is a dedicated one for it.
             Height is set dynamically by js/rsvp-flow.js (ensureMobileScrollRoom)
             to fit whatever the current top card needs; empty on desktop, where
             every card already fits the viewport. -->
        <div class="rsvp-flow-scroll-spacer" aria-hidden="true"></div>

        <div id="footer-placeholder"></div>

    </div>

    <!-- Rive intro canvas — sits outside #protected-content so its stacking context
         isn't broken by the parent. Starts hidden; rive-intro.js reveals it only when
         the animation actually plays (after password unlock), then fades it out on complete. -->
    <div id="rive-container" class="hidden" aria-hidden="true">
        <canvas id="rive-canvas"></canvas>
    </div>
    <!-- Skip button — shown during the animation, hidden otherwise -->
    <button id="skip-intro" class="hidden" aria-label="Skip intro animation">Skip</button>

    <!-- Replay icon — fades in with the settle (body.intro-complete). Clears the
         once-per-session gate and reloads, re-entering the single playback pipeline.
         Image is the Metro car line illustration, using the standard light/dark swap. -->
    <button id="replay-intro" class="replay-intro" aria-label="Replay intro animation">
        <img src="assets/illustrations/train-light.svg" data-light="assets/illustrations/train-light.svg"
            data-dark="assets/illustrations/train-dark.svg" alt="">
    </button>

    <script>
        // Apply dark mode immediately to prevent flash
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.documentElement.classList.add('dark-mode');
            document.body.classList.add('dark-mode');
        }

        // ===========================
        // Password Protection
        // ===========================
        if (location.hash.includes('figmacapture=')) {
            sessionStorage.setItem('rsvpUnlocked', 'true');
        }
        const correctPassword = 'beautifulsuperstar';
        const passwordOverlay = document.getElementById('password-overlay');
        const protectedContent = document.getElementById('protected-content');
        const passwordForm = document.getElementById('password-form');
        const passwordInput = document.getElementById('password-input');
        const passwordError = document.getElementById('password-error');

        if (sessionStorage.getItem('rsvpUnlocked') === 'true') {
            unlockContent();
        }

        passwordForm.addEventListener('submit', function (e) {
            e.preventDefault();
            if (passwordInput.value === correctPassword) {
                sessionStorage.setItem('rsvpUnlocked', 'true');
                unlockContent();
            } else {
                passwordError.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        function unlockContent() {
            passwordOverlay.classList.add('hidden');
            protectedContent.classList.add('unlocked');
            document.body.classList.remove('locked');
        }

        if (sessionStorage.getItem('rsvpUnlocked') !== 'true') {
            document.body.classList.add('locked');
        }

        passwordInput.addEventListener('input', function () {
            passwordError.classList.remove('show');
        });
    </script>
    <script src="includes/site-init.js"></script>
    <script src="js/rive-intro.js"></script>
    <script src="js/rsvp-flow.js"></script>
</body>

</html>
