<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Adina and Andrew's wedding website.">
    <title>Adina & Andrew</title>
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/favicon/favicon.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/assets/favicon/favicon.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preload" as="image" href="assets/textures/combined-light.png">
    <link rel="preload" as="image" href="assets/textures/combined-dark.png">
</head>

<body class="page-home">
    <!-- Password Protection Overlay -->
    <div id="password-overlay">
        <div class="password-container">
            <h2>Welcome</h2>
            <p>Please enter the password:</p>
            <form id="password-form">
                <input type="password" id="password-input" class="password-input" placeholder="Enter password"
                    autocomplete="off">
                <button type="submit" class="password-submit">Enter</button>
                <p class="password-error" id="password-error">Incorrect password. Please try again.</p>
            </form>
        </div>
    </div>

    <!-- Nav lives outside #protected-content so position: fixed isn't broken by parent stacking/blend contexts -->
    <div id="nav-placeholder"></div>

    <!-- Protected Content -->
    <div id="protected-content">

        <main class="registry-page">
            <section class="registry-section">
                <div class="content-wrapper homepage-hero">

                    <img src="assets/names/names-image.png" alt="Adina Nelson & Andrew DeFrank"
                        class="std-names-image" id="names-image"
                        data-light="assets/names/names-image.png"
                        data-dark="assets/names/names-image-dark.png">

                    <p class="homepage-date">October 17, 2026</p>
                    <p class="homepage-location">Washington, DC</p>

                    <div class="homepage-illustration">
                        <img src="assets/illustrations/Dupont-light.png" alt="" class="dupont-icon" id="dupont-icon"
                            data-light="assets/illustrations/Dupont-light.png"
                            data-dark="assets/illustrations/Dupont-dark.png">
                    </div>

                </div>
            </section>
        </main>

        <div id="footer-placeholder"></div>

    </div>

    <script>
        // Apply dark mode immediately to prevent flash
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.documentElement.classList.add('dark-mode');
            document.body.classList.add('dark-mode');
        }

        // ===========================
        // Password Protection
        // ===========================
        const correctPassword = 'october17';
        const passwordOverlay = document.getElementById('password-overlay');
        const protectedContent = document.getElementById('protected-content');
        const passwordForm = document.getElementById('password-form');
        const passwordInput = document.getElementById('password-input');
        const passwordError = document.getElementById('password-error');

        // localStorage, not sessionStorage (July 2026): a guest who RSVPs on
        // Monday and returns Friday for the hotel block would otherwise be
        // walled again, possibly without the invitation email to hand.
        if (localStorage.getItem('siteUnlocked') === 'true') {
            unlockContent();
        }

        passwordForm.addEventListener('submit', function (e) {
            e.preventDefault();
            if (passwordInput.value === correctPassword) {
                localStorage.setItem('siteUnlocked', 'true');
                unlockContent();
            } else {
                passwordError.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        function unlockContent() {
            passwordOverlay.classList.add('hidden');
            protectedContent.classList.add('unlocked');
            document.body.classList.remove('locked');
        }

        if (localStorage.getItem('siteUnlocked') !== 'true') {
            document.body.classList.add('locked');
        }

        passwordInput.addEventListener('input', function () {
            passwordError.classList.remove('show');
        });

    </script>
    <script src="includes/site-init.js"></script>
</body>

</html>
