<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Adina and Andrew are getting married!">
    <title>Adina & Andrew</title>
    <link rel="icon" type="image/png" sizes="512x512" href="/images/favicon.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/images/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preload" as="image" href="images/textures/combined-light.png">
    <link rel="preload" as="image" href="images/textures/combined-dark.png">
</head>

<body>
    <!-- Password Protection Overlay -->
    <div id="password-overlay">
        <div class="password-container">
            <h2>Save the Date</h2>
            <p>Please enter the password:</p>
            <form id="password-form">
                <input type="password" id="password-input" class="password-input" placeholder="Enter password"
                    autocomplete="off">
                <button type="submit" class="password-submit">Enter</button>
                <p class="password-error" id="password-error">Incorrect password. Please try again.</p>
            </form>
        </div>
    </div>

    <script>
        // Apply saved dark mode preference before rendering
        if (localStorage.getItem('darkMode') === 'enabled') {
            document.body.classList.add('dark-mode');
            document.documentElement.classList.add('dark-mode');
        }

        // If already unlocked, redirect immediately
        if (sessionStorage.getItem('saveTheDateUnlocked') === 'true') {
            window.location.href = '/savethedate';
        }

        document.body.classList.add('locked');

        const correctPassword = 'october17';
        const passwordForm = document.getElementById('password-form');
        const passwordInput = document.getElementById('password-input');
        const passwordError = document.getElementById('password-error');

        passwordForm.addEventListener('submit', function (e) {
            e.preventDefault();
            if (passwordInput.value === correctPassword) {
                sessionStorage.setItem('saveTheDateUnlocked', 'true');
                window.location.href = '/savethedate';
            } else {
                passwordError.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        passwordInput.addEventListener('input', function () {
            passwordError.classList.remove('show');
        });
    </script>
</body>

</html>
